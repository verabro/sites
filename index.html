<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sites</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f7f2;
        color: #202124;
      }

      main {
        width: min(720px, calc(100vw - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        max-width: 560px;
        font-size: 1.125rem;
        line-height: 1.6;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #151713;
          color: #f2f2ea;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sites</h1>
      <p>This repository is ready for GitHub Pages. Replace this page with your next website when you are ready.</p>
    </main>
  </body>
</html>
